<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amozn Arch Online Store</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; text-align: center; }
        header { background: #232f3e; color: white; padding: 15px; font-size: 24px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 280px; }
        .product-card img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; }
        .product-card h3 { margin: 15px 0 10px; font-size: 18px; }
        .product-card p { color: #b12704; font-size: 20px; font-weight: bold; }
        .buy-btn { background: #ffd814; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .buy-btn:hover { background: #f7ca00; }
        /* Checkout Form Styling */
        #checkout-form { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; width: 90%; max-width: 350px; }
        #checkout-form input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { background: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

<header>Amozn Arch Store</header>

<div class="container">
    <div class="product-card">
        <img src="57176.jpg" alt="Duck Oil Dispenser">
        <h3>Duck Oil Dispenser</h3>
        <p>Price: ₹249</p>
        <button class="buy-btn" onclick="openForm('Duck Oil Dispenser', 249)">Buy Now</button>
    </div>

    <div class="product-card">
        <img src="sunscreen1.jpg" alt="Sunscreen 1">
        <img src="sunscreen2.jpg" alt="Sunscreen 2">
        <img src="sunscreen3.jpg" alt="Sunscreen 3">
        <img src="sunscreen4.jpg" alt="Sunscreen 4">
        
        <h3>Sunscreen SPF 50</h3>
        <p>Price: ₹127</p>
        <button class="buy-btn" onclick="openForm('Sunscreen SPF 50', 127)">Buy Now</button>
    </div>
</div>

<div id="overlay" onclick="closeForm()"></div>
<div id="checkout-form">
    <h3 id="form-title">Order Details</h3>
    <input type="text" id="custName" placeholder="Your Name" required>
    <input type="text" id="custAddress" placeholder="Your Full Address" required>
    <input type="tel" id="custPhone" placeholder="WhatsApp Number" required>
    <button class="submit-btn" onclick="sendToWhatsApp()">Order on WhatsApp</button>
</div>

<script>
    let selectedProduct = "";
    let selectedPrice = "";

    function openForm(name, price) {
        selectedProduct = name;
        selectedPrice = price;
        document.getElementById('form-title').innerText = "Order: " + name;
        document.getElementById('checkout-form').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeForm() {
        document.getElementById('checkout-form').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function sendToWhatsApp() {
        const name = document.getElementById('custName').value;
        const address = document.getElementById('custAddress').value;
        const phone = document.getElementById('custPhone').value;

        if(!name || !address || !phone) { alert("Please fill all details!"); return; }

        // ഇവിടെ നിന്റെ വാട്സ്ആപ്പ് നമ്പർ (91 ചേർത്ത്) നൽകുക
        const whatsappNumber = "919061014167"; 
        const message = `*New Order From Amozn Arch*%0A---------------------------%0A*Product:* ${selectedProduct}%0A*Price:* ₹${selectedPrice}%0A---------------------------%0A*Customer Details:*%0AName: ${name}%0AAddress: ${address}%0APhone: ${phone}`;
        
        window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
